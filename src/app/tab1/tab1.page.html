<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Filmes
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-list *ngif="listaFilmes">
    <ion-item-sliding *ngfor="let filme of listaFilmes">
      <ion-item lines="full" >
        
        <ion-tumbnail slot="start">
          <img *ngif="filme.cartaz" src="{{filme.cartaz}}" />
          <ion-icon *ngif="!filme.cartaz" name="videocam-off"></ion-icon>
        </ion-tumbnail>

        <ion-label class="ion-text-wrap">
          <div>

           <h1>{{ filme.nome }}</h1>
           <p>{{ filme.lancamento }}</p>
           <ion-badge color="medium" *ngfor="let genero of filme.generos">
            {{ genero }}
           </ion-badge>
          </div>
        </ion-label>
        <ion-chip [color]="filme.classificacao < 5 ? 'danger' : ((filme.classificacao < 7 ? 'warning' : 'success'))"
        outline>
          {{ filme.classificacao }}
      </ion-item>

  </ion-list>
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Tab 1</ion-title>
    </ion-toolbar>
  </ion-header>

  <app-explore-container name="Tab 1 page"></app-explore-container>
</ion-content>
