<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Atores
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-list *ngif="listaAtores">

    <ion-item-sliding *ngfor="let ator of listaAtores">
      <ion-item lines="full" (click)="exibirAtor(ator)">

        <ion-tumbnail slot="start">
          <img *ngif="ator.cartaz" src="{{ator.cartaz}}" />
          <ion-icon *ngif="!ator.cartaz" name="videocam-off"></ion-icon>
        </ion-tumbnail>

        <ion-label class="ion-text-wrap">
          <div>
           <h1>{{ ator.nome }}</h1>
           <p>{{ ator.anos }}</p>
           <ion-badge color="medium" *ngfor="let genero of ator.generos">
            {{ genero }}
           </ion-badge>
           <ion-icon name="star" [color]="ator.favorito===true ? 'warning' : ('light')"></ion-icon>
          </div>
        </ion-label>

        <ion-chip [color]="ator.classificacao < 5 ? 'danger' : ((ator.classificacao < 7 ? 'warning' : 'success'))"
        outline>
          <ion-label>{{ ator.classificacao }}</ion-label>
        </ion-chip>
      </ion-item>

      <ion-item-options side="start">
        <ion-item-option color="primary" (click)="exibirAlertaFavorito(ator)">
          <ion-icon slot="icon-only" name="star"></ion-icon>
        </ion-item-option>
      </ion-item-options>

    </ion-item-sliding>


  </ion-list>
</ion-content>
